<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código Postal</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="contenedor">

    <h1>Validación de Código Postal</h1>

    <p>
        Ingresa un código postal válido de 5 números.
    </p>

    <form id="formulario">

        <label>Código Postal</label>

        <input 
        type="text"
        id="cp"
        placeholder="Ejemplo: 50180"
        pattern="[0-9]{5}"
        required>

        <button type="submit">
            Validar
        </button>

    </form>

    <div id="mensaje"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
